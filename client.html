<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>客户端登录管理</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    button { padding: 6px 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>登录管理</h2>
  <button onclick="loadAccounts()">刷新</button>
  <div id="error"></div>
  <table>
    <thead>
      <tr><th>账号</th><th>服务端状态</th><th>操作</th><th>消息</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    async function loadAccounts() {
      const res = await fetch("/accounts");
      const data = await res.json();
      if (data.error) {
        document.getElementById("error").textContent = data.error;
        return;
      }
      document.getElementById("error").textContent = "";
      const tbody = document.getElementById("tbody");
      tbody.innerHTML = "";
      for (const [i, acc] of data.entries()) {
        const status =
          acc.server_logged_in === true ? "✅ 已登录" :
          acc.server_logged_in === false ? "❌ 未登录" : "⚠️ 无法连接";
        const btnDisabled = acc.login_running ? "disabled" : "";
        const btnText = acc.login_running ? "登录中..." : "触发登录";
        tbody.innerHTML += `<tr id="row-${i}">
          <td>${esc(acc.username)}</td>
          <td>${status}</td>
          <td><button ${btnDisabled} onclick="triggerLogin('${esc(acc.username)}', ${i})">${btnText}</button></td>
          <td id="msg-${i}">${esc(acc.message)}</td>
        </tr>`;
      }
    }

    async function triggerLogin(username, idx) {
      const btn = document.querySelector(`#row-${idx} button`);
      btn.disabled = true;
      btn.textContent = "登录中...";
      await fetch(`/login/${encodeURIComponent(username)}`, { method: "POST" });
      pollAccount(username, idx);
    }

    function pollAccount(username, idx) {
      const timer = setInterval(async () => {
        const res = await fetch("/accounts");
        const data = await res.json();
        const acc = data.find(a => a.username === username);
        if (!acc) { clearInterval(timer); return; }
        document.getElementById(`msg-${idx}`).textContent = acc.message;
        if (!acc.login_running) {
          clearInterval(timer);
          loadAccounts();
        }
      }, 2000);
    }

    function esc(str) {
      return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    loadAccounts();
    setInterval(loadAccounts, 5000);
  </script>
</body>
</html>
