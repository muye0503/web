<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>客户端登录管理</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; }
    .row { display: flex; justify-content: space-between; margin: 10px 0; }
    .label { color: #666; }
    .value { font-weight: bold; }
    button { margin-top: 20px; width: 100%; padding: 10px; font-size: 16px; cursor: pointer; }
    #message { margin-top: 16px; padding: 10px; background: #f5f5f5; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin-top:0">登录管理</h2>
    <div class="row">
      <span class="label">账号</span>
      <span class="value" id="username">-</span>
    </div>
    <div class="row">
      <span class="label">最后登录时间</span>
      <span class="value" id="updated_at">-</span>
    </div>
    <div id="message">加载中...</div>
    <button id="btn" onclick="triggerLogin()">触发登录</button>
  </div>

  <script>
    function updateUI(data) {
      document.getElementById("username").textContent = data.username || "-";
      document.getElementById("updated_at").textContent = data.session_updated_at || "从未登录";
      document.getElementById("message").textContent = data.message;
      document.getElementById("btn").disabled = data.login_running;
      document.getElementById("btn").textContent = data.login_running ? "登录中..." : "触发登录";
    }

    async function fetchStatus() {
      const res = await fetch("/status");
      const data = await res.json();
      updateUI(data);
      return data;
    }

    async function triggerLogin() {
      await fetch("/login", { method: "POST" });
      pollStatus();
    }

    function pollStatus() {
      const timer = setInterval(async () => {
        const data = await fetchStatus();
        if (!data.login_running) clearInterval(timer);
      }, 2000);
    }

    fetchStatus();
  </script>
</body>
</html>
